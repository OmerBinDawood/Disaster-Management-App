version: "3.8"

services:

  web:
    image: node:18
    container_name: ci_web_app
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "3001:3000"
    command: sh -c "npm install && npm run dev"
    environment:
      - MONGODB_URI=mongodb://mongo:27017/disasterApp
      - JWT_SECRET=dev_secret_key
    depends_on:
      - mongo

  mongo:
    image: mongo:6
    container_name: ci_mongo_db
    restart: always
    ports:
      - "27018:27017"
    volumes:
      - mongo_ci_data:/data/db

volumes:
  mongo_ci_data:
