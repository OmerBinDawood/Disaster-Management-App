version: "3.8"

services:

  web:
    image: node:18
    container_name: ci_web_app
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "3001:3000"
    command: sh -c "npm install && npm run dev"
    environment:
      - MONGODB_URI=MONGODB_URI=mongodb://mongo:27017/disasterApp
      - MONGODB_DB=disasterApp
      - JWT_SECRET=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VyIjoiT21lciIsImlhdCI6MTY5OTk5OTk5OX0.Dx8N7QwXzF1H9yT2rF3k7gM5JvE1uL4Kp9s2yA1B6C0
    depends_on:
      - mongo

  mongo:
    image: mongo:6
    container_name: ci_mongo_db
    restart: always
    ports:
      - "27018:27017"
    volumes:
      - mongo_ci_data:/data/db

volumes:
  mongo_ci_data:
