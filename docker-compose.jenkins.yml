version: "3.8"

services:

  web:
    image: node:18   # or python:3.10 depending on your app
    container_name: ci_web_app
    working_dir: /app
    volumes:
      - .:/app
    command: sh -c "npm install && npm start"
    ports:
      - "3001:3000"   # DIFFERENT PORT than Part I
    depends_on:
      - db

  db:
    image: mongo:6
    container_name: ci_mongo_db
    restart: always
    volumes:
      - mongo_ci_data:/data/db

volumes:
  mongo_ci_data:
